version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: kedaikopi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD required}
      MYSQL_DATABASE: ${DB_DATABASE:-kedaikopi}
      MYSQL_USER: ${DB_USERNAME:-kedaikopi}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
    ports:
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/docker/mysql-init:/docker-entrypoint-initdb.d
    networks:
      - kedaikopi
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --default-authentication-plugin=caching_sha2_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=256M
      --slow-query-log=1
      --slow-query-log-file=/var/log/mysql/slow.log
      --long-query-time=2
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kedaikopi-backend
    restart: unless-stopped
    environment:
      APP_NAME: KedaiKopi
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY:?APP_KEY required - run: php artisan key:generate --show}
      APP_URL: ${APP_URL:-http://localhost:8000}
      APP_TIMEZONE: Asia/Jakarta
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-kedaikopi}
      DB_USERNAME: ${DB_USERNAME:-kedaikopi}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:5173}
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      LOG_CHANNEL: daily
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@kedaikopi.id}
      MAIL_FROM_NAME: KedaiKopi
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - backend_storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kedaikopi
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: kedaikopi-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kedaikopi
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  # Development only: phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:5
    container_name: kedaikopi-pma
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
      UPLOAD_LIMIT: 64M
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kedaikopi
    profiles:
      - dev

volumes:
  mysql_data:
    driver: local
  backend_storage:
    driver: local

networks:
  kedaikopi:
    driver: bridge
