<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 56" fill="none">
  <!-- Coffee bean left -->
  <g transform="translate(2, 4)">
    <ellipse cx="14" cy="24" rx="10" ry="16" fill="#c8834b" opacity="0.85" transform="rotate(-15 14 24)"/>
    <path d="M10 14c2 8 2 14 0 20" stroke="#3b190d" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4" transform="rotate(-15 14 24)"/>
    <!-- Coffee bean right -->
    <ellipse cx="34" cy="24" rx="10" ry="16" fill="#d69550" opacity="0.85" transform="rotate(15 34 24)"/>
    <path d="M30 14c2 8 2 14 0 20" stroke="#3b190d" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4" transform="rotate(15 34 24)"/>
  </g>
  <!-- Brand name -->
  <text x="56" y="23" font-family="'Georgia','Times New Roman',serif" font-size="14" font-weight="bold" letter-spacing="2" fill="#d69550">KEDAI</text>
  <text x="56" y="45" font-family="'Georgia','Times New Roman',serif" font-size="28" font-weight="bold" letter-spacing="1" fill="#f5e6d3">KOPI</text>
  <!-- Dot separator -->
  <circle cx="145" cy="34" r="2" fill="#c8834b" opacity="0.5"/>
  <!-- Tagline -->
  <text x="155" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="10" letter-spacing="3" fill="#8b7355" opacity="0.8">INDONESIA</text>
</svg>
